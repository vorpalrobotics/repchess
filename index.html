<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>REPchess</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/cm-chessboard@8/assets/chessboard.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<style>
  body{font-family:Arial,sans-serif;margin:0;padding:1rem 1.2rem}
  .field{display:inline-flex;flex-wrap:wrap;align-items:center;gap:.6rem;margin-bottom:.9rem}
  label{flex:0 0 100px}
  input,select{padding:.3rem .5rem}
  button{padding:.35rem .75rem;font-weight:600;cursor:pointer;border:1px solid #888;border-radius:4px;background:#f5f5f5}
  #progress{margin-top:.7rem;font-style:italic}
  #progress.error{color:#c62828;font-weight:700;font-style:normal}

  table{border-collapse:collapse;margin-top:.4rem;table-layout:auto}
  th,td{padding:.1rem .4rem;border-bottom:1px solid #ddd;text-align:left;vertical-align:top}
  th{background:#f5f5f5}

  td.resp {white-space:nowrap;width:1%}
  td.move {min-width:8em;white-space:nowrap}
  td.cnt  {min-width:8em;white-space:nowrap}

  .branch{margin-top:.4rem}
  .indent{margin-left:5em}

  .iconbtn{background:none;border:none;font-size:1.1em;padding:0 .4em;cursor:pointer}
  .toggle {font-size:1.15em;vertical-align:middle}

  tr.meta-row td{border-bottom:1px solid #ddd;padding-top:0;font-size:.78rem;color:#555}
  tr.meta-row .meta-mnem,
  tr.meta-row .meta-note{margin-right:1.3em;cursor:pointer}
  tr.meta-row .meta-mnem:hover,
  tr.meta-row .meta-note:hover{text-decoration:underline}
  tr.meta-row i{margin-right:.35em;color:#888}

  .row-menu-wrap{position:relative;display:inline-block}
  .row-menu{position:absolute;left:0;top:1.7em;background:#fff;border:1px solid #888;border-radius:4px;box-shadow:0 2px 8px rgba(0,0,0,.15);display:none;flex-direction:column;min-width:10em;z-index:10}
  .row-menu.show{display:flex}
  .row-menu button{border:none;background:none;text-align:left;padding:.4em .8em;font-weight:400;font-size:.85rem;display:flex;align-items:center;gap:.5em}
  .row-menu button:hover{background:#f0f0f0}
  .row-menu i{width:1.1em;text-align:center;color:#888}

  #side{width:6em;flex:0 0 auto}
  #firstMove{width:8em;flex:0 0 auto}

  .topbar{display:flex;justify-content:space-between;align-items:center}
  #menuBtn{font-size:1.4em;border:none;background:none;padding:.1em .4em}

  #menuList{position:absolute;right:1.2rem;top:3rem;background:#fff;border:1px solid #888;border-radius:4px;box-shadow:0 2px 8px rgba(0,0,0,.15);display:none;flex-direction:column;min-width:11em;z-index:10}
  #menuList button{border:none;background:none;text-align:left;padding:.5em .9em;border-radius:0;font-weight:400}
  #menuList button:hover{background:#f0f0f0}

  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;align-items:center;justify-content:center;z-index:20}
  .modal{background:#fff;border-radius:6px;padding:1.2rem 1.4rem;min-width:18em;box-shadow:0 4px 16px rgba(0,0,0,.25)}
  .modal h2{margin-top:0}
  .modal .modal-actions{margin-top:1rem;text-align:right}

  .main-layout{display:flex;align-items:flex-start;gap:1.5rem}
  #tree-col{flex:1 1 auto;min-width:0}
  #board-col{flex:0 0 auto;width:420px}
  #board{width:420px;height:420px}

  #engine-panel{width:420px;margin-top:.6rem;font-family:'Courier New',monospace;font-size:.85rem}
  #engine-controls{display:flex;justify-content:space-between;align-items:center;margin-bottom:.3rem;font-family:Arial,sans-serif;font-size:.8rem}
  #engineDepth{font-weight:700}
  #engine-options{display:flex;gap:.8rem}
  #engine-options label{display:inline-flex;align-items:center;gap:.3rem}
  #engine-options select{font-size:.8rem;padding:.1rem .3rem}
  #engineLines{margin:0;padding-left:1.3em}
  #engineLines li{margin-bottom:.25rem}
</style>
</head>
<body>
<div class="topbar">
  <h1><img src="images/REPchess-logo-200.png" alt="" style="height:1.4em;width:1.4em;vertical-align:middle;border-radius:.2em;margin-right:.3em"> REPchess <span id="buildStamp" style="font-size:.55em;font-weight:400;color:#888"></span></h1>
  <div style="position:relative">
    <button id="menuBtn" title="Menu">&#9776;</button>
    <div id="menuList">
      <button id="menuDownload">Download Games</button>
      <button id="menuAbout">About</button>
    </div>
  </div>
</div>

<div class="field">
  <label>Side:</label>
  <select id="side"><option value="white">White</option><option value="black">Black</option></select>
  <label>First move:</label><input id="firstMove" value="d4">
</div>

<div id="progress"></div>

<div class="main-layout">
  <div id="tree-col">
    <div id="tree"></div>
  </div>
  <div id="board-col">
    <div id="board"></div>
    <div id="engine-panel">
      <div id="engine-controls">
        <div id="engineDepth"></div>
        <div id="engine-options">
          <label>Lines:
            <select id="engineLinesSelect">
              <option>1</option><option>2</option><option>3</option>
              <option selected>4</option><option>5</option><option>6</option>
            </select>
          </label>
          <label>Depth:
            <select id="engineMaxDepthSelect">
              <option>15</option><option>20</option><option>25</option>
              <option selected>30</option><option>35</option><option>40</option>
              <option value="infinity">infinity</option>
            </select>
          </label>
        </div>
      </div>
      <ol id="engineLines"></ol>
    </div>
  </div>
</div>

<!-- download games modal -->
<div id="downloadOverlay" class="overlay">
  <div class="modal">
    <h2>Download Games</h2>
    <div class="field">
      <label>Lichess ID:</label><input id="userId">
    </div>
    <div class="field">
      <label>Max:</label><input id="maxGames" type="number" min="1" value="300" style="width:90px">
    </div>
    <div class="modal-actions">
      <button id="downloadCancelBtn">Cancel</button>
      <button id="dlBtn">DOWNLOAD</button>
    </div>
  </div>
</div>

<!-- about modal -->
<div id="aboutOverlay" class="overlay">
  <div class="modal">
    <h2>About REPchess</h2>
    <p>Version 0.1</p>
    <p>Copyright (C) 2026 Vorpal Robotics, LLC</p>
    <div class="modal-actions">
      <button id="aboutCloseBtn">Close</button>
    </div>
  </div>
</div>

<!-- add note / mnemonic modal -->
<div id="fieldOverlay" class="overlay">
  <div class="modal">
    <h2 id="fieldModalTitle">Add Note</h2>
    <div class="field">
      <input id="fieldModalInput" style="width:100%;max-width:22em">
    </div>
    <div id="fieldModalError" style="color:#c62828;font-size:.85em;min-height:1.2em"></div>
    <div class="modal-actions">
      <button id="fieldModalCancelBtn">Cancel</button>
      <button id="fieldModalSaveBtn">SAVE</button>
    </div>
  </div>
</div>

<!-- hidden file chooser for manual NDJSON uploads -->
<input id="fileImport" type="file" accept=".ndjson,.jsonl,.txt" style="display:none">

<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
<script src="js/version.js"></script>
<script src="js/db.js"></script>
<script type="module" src="js/app.js"></script>
</body>
</html>
