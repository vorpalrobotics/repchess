<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>REPchess</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/cm-chessboard@8/assets/chessboard.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<style>
  body{font-family:Arial,sans-serif;margin:0;padding:1rem 1.2rem}
  .field{display:inline-flex;flex-wrap:wrap;align-items:center;gap:.6rem;margin-bottom:.9rem}
  label{flex:0 0 100px}
  input,select{padding:.3rem .5rem}
  button{padding:.35rem .75rem;font-weight:600;cursor:pointer;border:1px solid #888;border-radius:4px;background:#f5f5f5}
  #progress{margin-top:.7rem;font-style:italic}
  #progress.error{color:#c62828;font-weight:700;font-style:normal}

  table{border-collapse:collapse;margin-top:.4rem;table-layout:auto}
  th,td{padding:.1rem .4rem;border-bottom:1px solid #ddd;text-align:left;vertical-align:top}
  th{background:#f5f5f5}

  td.resp {white-space:nowrap;width:1%}
  td.move {width:10ch;white-space:nowrap}
  td.cnt-col {width:12ch;white-space:nowrap}
  td.eval-col {width:9ch;white-space:nowrap}
  td.name-col {white-space:nowrap}
  .cnt    {font-style:italic;font-size:.85em;color:#666}
  .branchName{font-weight:600;font-style:italic;color:#444}
  .analyzingIcon{margin-right:.4em;cursor:pointer;color:#1565c0}
  .analyzingIcon:hover{color:#0d47a1}

  tr.add-move td{padding-top:.2rem;padding-bottom:.2rem;border-bottom:none}
  .add-move .addMoveBtn{color:#aaa;font-size:.85em}
  .add-move .addMoveBtn:hover{color:#777}

  .evaltag{font-weight:700;font-family:'Courier New',monospace}
  .evaltag.evaltag-live{outline:2px solid #1565c0;outline-offset:2px;border-radius:3px;animation:evaltag-live-pulse 1.2s ease-in-out infinite}
  @keyframes evaltag-live-pulse{0%,100%{outline-color:#1565c0}50%{outline-color:#90caf9}}
  .evaltag.eval-neutral  {color:#777}
  .evaltag.eval-inferior {color:#e65100}
  .evaltag.eval-losing   {color:#c62828}
  .evaltag.eval-superior {color:#1565c0}
  .evaltag.eval-winning  {color:#2e7d32}

  .branch{margin-top:.4rem}
  .focus-hidden{display:none}

  .hidden-branch td.move{color:#c62828}
  #tree.filter-hidden tr.hidden-branch{display:none}

  .iconbtn{background:none;border:none;font-size:1.1em;padding:0 .4em;cursor:pointer}
  .iconbtn.btnEval-onBoard{border:2px solid #000;border-radius:4px}
  .toggle {font-size:1.15em;vertical-align:middle}

  #hoverPreview{position:fixed;display:none;z-index:50;background:#fff;border:2px solid #333;border-radius:4px;padding:4px;box-shadow:0 2px 10px rgba(0,0,0,.3)}
  #hoverPreview #hoverPreviewBoard{width:240px;height:240px}

  tr.meta-row td{border-bottom:1px solid #ddd;padding-top:0;font-size:.78rem;color:#555}
  tr.meta-row .meta-mnem,
  tr.meta-row .meta-note{margin-right:1.3em;cursor:pointer}
  tr.meta-row .meta-mnem:hover,
  tr.meta-row .meta-note:hover{text-decoration:underline}
  tr.meta-row i{margin-right:.35em;color:#888}

  .row-menu-wrap{position:relative;display:inline-block}
  .row-menu{position:absolute;left:0;top:1.7em;background:#fff;border:1px solid #888;border-radius:4px;box-shadow:0 2px 8px rgba(0,0,0,.15);display:none;flex-direction:column;min-width:10em;z-index:10}
  .row-menu.show{display:flex}
  .row-menu button{border:none;background:none;text-align:left;padding:.4em .8em;font-weight:400;font-size:.85rem;display:flex;align-items:center;gap:.5em}
  .row-menu button:hover{background:#f0f0f0}
  .row-menu i{width:1.1em;text-align:center;color:#888}
  .row-menu-sep{width:100%;border:none;border-top:1px solid #ddd;margin:.3em 0}

  .topbar{display:flex;justify-content:space-between;align-items:center;background:#e3f2fd;padding:.4rem 1rem;margin:-1rem -1.2rem .9rem;border-radius:0 0 6px 6px}

  .home-header{display:flex;justify-content:space-between;align-items:center}
  #newLineBtn{font-size:1.3em;line-height:1;padding:.1em .4em;color:green;background:none;border:none}
  #linesList{display:flex;flex-direction:column;gap:.4rem;margin-top:.6rem}
  .line-row{display:flex;align-items:center;gap:.8rem;padding:.5rem .7rem;border:1px solid #ddd;border-radius:4px;cursor:pointer}
  .line-row:hover{background:#f5f5f5}
  .line-name{font-weight:600;flex:1 1 auto}
  .line-color{text-transform:capitalize;color:#666;font-size:.85em}
  .line-opening{color:#666;font-size:.85em;font-family:'Courier New',monospace}

  .line-header{display:flex;align-items:center;gap:.8rem;margin-bottom:.6rem}
  .trigger-heading{margin:1rem 0 .3rem;font-size:1rem}
  .trigger-heading:first-child{margin-top:0}
  #menuBtn{font-size:1.4em;border:none;background:none;padding:.1em .4em}

  #menuList{position:absolute;right:1.2rem;top:3rem;background:#fff;border:1px solid #888;border-radius:4px;box-shadow:0 2px 8px rgba(0,0,0,.15);display:none;flex-direction:column;min-width:11em;z-index:10}
  #menuList button{border:none;background:none;text-align:left;padding:.5em .9em;border-radius:0;font-weight:400}
  #menuList button:hover{background:#f0f0f0}

  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;align-items:center;justify-content:center;z-index:20}
  .modal{background:#fff;border-radius:6px;padding:1.2rem 1.4rem;min-width:18em;box-shadow:0 4px 16px rgba(0,0,0,.25)}
  .modal h2{margin-top:0}
  .modal .modal-actions{margin-top:1rem;text-align:right}

  .main-layout{display:flex;align-items:flex-start;gap:1.5rem}
  #tree-col{flex:1 1 auto;min-width:0}
  #board-col{flex:0 0 auto;width:420px}
  #board{width:420px;height:420px}

  #engine-panel{width:420px;margin-top:.6rem;font-family:'Courier New',monospace;font-size:.85rem}
  #engine-controls{display:flex;justify-content:space-between;align-items:center;margin-bottom:.3rem;font-family:Arial,sans-serif;font-size:.8rem}
  #engineDepth{font-weight:700}
  #engine-options{display:flex;gap:.8rem}
  #engine-options label{display:inline-flex;align-items:center;gap:.3rem}
  #engine-options select{font-size:.8rem;padding:.1rem .3rem}
  #engineLines{margin:0;padding-left:0;list-style:none}
  #engineLines li{margin-bottom:.25rem;display:flex;align-items:flex-start;gap:.2rem}
  #engineLines .pvToggle{font-size:.9em;padding:0 .3em;flex:0 0 auto}
  #engineLines .pvText{flex:1 1 auto}

  #mnemonicsOverlay .modal{width:94vw;height:92vh;max-width:none;display:flex;flex-direction:column}
  .mnem-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:.6rem}
  .mnem-header h2{margin:0}
  .mnem-body{display:flex;gap:1.2rem;flex:1 1 auto;min-height:0}
  #mnemonicsGridWrap{flex:0 0 auto;height:100%;aspect-ratio:1/1}
  #mnemonicsGrid{display:grid;grid-template-columns:repeat(8,1fr);grid-template-rows:repeat(8,1fr);width:100%;height:100%;border:2px solid #333}
  .mnem-notes-col{flex:1 1 auto;min-width:14em;display:flex;flex-direction:column;gap:.4rem}
  .mnem-notes-col label{font-weight:600;font-size:.9rem;display:flex;align-items:center;gap:.5em}
  .mnem-notes-saved{font-weight:400;font-size:.8em;color:#2e7d32;opacity:0;transition:opacity .3s}
  .mnem-notes-saved.show{opacity:1}
  #mnemonicsNotes{flex:1 1 auto;resize:none;font-family:inherit;font-size:.9rem;padding:.6rem;border:1px solid #bbb;border-radius:4px}
  .mnem-square{position:relative;display:flex;flex-direction:column;align-items:flex-start;justify-content:center;cursor:pointer;font-size:.7rem;line-height:1.15;text-align:left;overflow:hidden;padding:2px 2px 2px 4px}
  .mnem-square.light{background:#f0d9b5}
  .mnem-square.dark{background:#b58863}
  .mnem-square:hover{outline:2px solid #1565c0;outline-offset:-2px}
  .mnem-square .mnem-word{font-weight:600;color:#222;white-space:nowrap;padding-left:1.5ch}
  .mnem-square .mnem-word i{width:1.1em;text-align:center;margin-right:.25em;color:#0009}
  .mnem-coord-file,.mnem-coord-rank{position:absolute;font-size:.65rem;font-weight:700;color:#0006}
  .mnem-coord-file{left:2px;bottom:1px}
  .mnem-coord-rank{left:2px;top:1px}

  #mnemonicsEditorOverlay .modal{min-width:34em}
  .mnem-editor-table{border-collapse:collapse;margin:.6rem 0;width:100%}
  .mnem-editor-table th{font-size:.8rem;font-weight:600;text-align:left;color:#555;padding:0 .5rem .3rem}
  .mnem-editor-table td{padding:.2rem .5rem;vertical-align:middle}
  .mnem-editor-table td:first-child{text-align:center;color:#888;width:1.6em}
  .mnem-editor-table input{width:9ch}
  .mnem-editor-table td:last-child input{width:100%;min-width:28ch}
</style>
</head>
<body>
<div class="topbar">
  <h1><img src="images/REPchess-logo-200.png" alt="" style="height:1.4em;width:1.4em;vertical-align:middle;border-radius:.2em;margin-right:.3em"> REPchess <span id="buildStamp" style="font-size:.55em;font-weight:400;color:#888"></span></h1>
  <div style="position:relative">
    <button id="menuBtn" title="Menu">&#9776;</button>
    <div id="menuList">
      <button id="menuDownload">Download Games</button>
      <button id="menuMnemonics">Manage Mnemonics</button>
      <button id="menuExport">Export Backup</button>
      <button id="menuImport">Import Backup</button>
      <button id="menuAbout">About</button>
    </div>
  </div>
</div>

<div id="progress"></div>

<div id="homeScreen">
  <div class="home-header">
    <h2>Your Lines</h2>
    <button id="newLineBtn" title="New Line"><i class="fa-solid fa-circle-plus"></i></button>
  </div>
  <div id="linesList"></div>
</div>

<div id="lineScreen" style="display:none">
  <div class="line-header">
    <button id="backBtn" title="Back to lines">&larr; Lines</button>
    <h2 id="lineTitle"></h2>
  </div>

  <div class="main-layout">
    <div id="tree-col">
      <button id="unfocusBtn" style="display:none;margin-bottom:.5rem">Unfocus</button>
      <button id="visibilityToggleBtn" title="Toggle hidden branches" style="margin-bottom:.5rem"><i class="fa-solid fa-eye"></i></button>
      <div id="tree"></div>
    </div>
    <div id="board-col">
      <div id="board"></div>
      <div id="engine-panel">
        <div id="engine-controls">
          <div id="engineDepth"></div>
          <div id="engine-options">
            <label>Lines:
              <select id="engineLinesSelect">
                <option>1</option><option>2</option><option>3</option>
                <option selected>4</option><option>5</option><option>6</option>
              </select>
            </label>
            <label>Depth:
              <select id="engineMaxDepthSelect">
                <option>15</option><option>20</option><option>25</option>
                <option selected>30</option><option>35</option><option>40</option>
              </select>
            </label>
          </div>
        </div>
        <ol id="engineLines"></ol>
      </div>
    </div>
  </div>
</div>

<!-- download games modal -->
<div id="downloadOverlay" class="overlay">
  <div class="modal">
    <h2>Download Games</h2>
    <div class="field">
      <label>Lichess ID:</label><input id="userId">
    </div>
    <div class="field">
      <label>Max:</label><input id="maxGames" type="number" min="1" value="300" style="width:90px">
    </div>
    <div class="modal-actions">
      <button id="downloadCancelBtn">Cancel</button>
      <button id="dlBtn">DOWNLOAD</button>
    </div>
  </div>
</div>

<!-- about modal -->
<div id="aboutOverlay" class="overlay">
  <div class="modal">
    <h2>About REPchess</h2>
    <p>Version 0.1</p>
    <p>Copyright (C) 2026 Vorpal Robotics, LLC</p>
    <div class="modal-actions">
      <button id="aboutCloseBtn">Close</button>
    </div>
  </div>
</div>

<!-- add note / mnemonic modal -->
<div id="fieldOverlay" class="overlay">
  <div class="modal">
    <h2 id="fieldModalTitle">Add Note</h2>
    <div class="field">
      <input id="fieldModalInput" style="width:100%;max-width:22em">
    </div>
    <div id="fieldModalError" style="color:#c62828;font-size:.85em;min-height:1.2em"></div>
    <div class="modal-actions">
      <button id="fieldModalCancelBtn">Cancel</button>
      <button id="fieldModalSaveBtn">SAVE</button>
    </div>
  </div>
</div>

<!-- new line modal -->
<div id="lineOverlay" class="overlay">
  <div class="modal">
    <h2>New Line</h2>
    <div class="field">
      <label>Name:</label><input id="lineNameInput" style="width:14em">
    </div>
    <div class="field">
      <label>Color:</label>
      <select id="lineColorInput">
        <option value="white">White</option>
        <option value="black">Black</option>
      </select>
    </div>
    <div class="field" id="lineOpeningField">
      <label>Opening move:</label><input id="lineOpeningInput" style="width:8em">
    </div>
    <div class="field" id="lineTriggerModeField" style="display:none">
      <label>Triggers:</label>
      <select id="lineTriggerModeInput">
        <option value="specific">Specific White move(s)</option>
        <option value="any">Any White first move</option>
      </select>
    </div>
    <div class="field" id="lineTriggersField" style="display:none">
      <label>White moves:</label><input id="lineTriggersInput" style="width:14em" placeholder="e.g. e4, d4">
    </div>
    <div id="lineModalError" style="color:#c62828;font-size:.85em;min-height:1.2em"></div>
    <div class="modal-actions">
      <button id="lineCancelBtn">Cancel</button>
      <button id="lineSaveBtn">SAVE</button>
    </div>
  </div>
</div>

<!-- analyze child nodes depth modal -->
<div id="analyzeChildrenOverlay" class="overlay">
  <div class="modal">
    <h2>Analyze Child Nodes</h2>
    <div class="field">
      <label>Depth:</label>
      <select id="analyzeChildrenDepthInput">
        <option>15</option><option>20</option><option>25</option>
        <option>30</option><option>35</option><option>40</option>
      </select>
    </div>
    <div class="modal-actions">
      <button id="analyzeChildrenCancelBtn">Cancel</button>
      <button id="analyzeChildrenGoBtn">GO</button>
    </div>
  </div>
</div>

<!-- manage mnemonics modal (full-screen grid) -->
<div id="mnemonicsOverlay" class="overlay">
  <div class="modal">
    <div class="mnem-header">
      <h2>Manage Mnemonics</h2>
      <button id="mnemonicsCloseBtn">Close</button>
    </div>
    <div class="mnem-body">
      <div id="mnemonicsGridWrap"><div id="mnemonicsGrid"></div></div>
      <div class="mnem-notes-col">
        <label for="mnemonicsNotes">Notes <span id="mnemonicsNotesSaved" class="mnem-notes-saved"></span></label>
        <textarea id="mnemonicsNotes" placeholder="Rules for piece disambiguation, underpromotion, castling, etc."></textarea>
      </div>
    </div>
  </div>
</div>

<!-- mnemonics square editor modal -->
<div id="mnemonicsEditorOverlay" class="overlay">
  <div class="modal">
    <h2 id="mnemonicsEditorTitle">Edit Square</h2>
    <table class="mnem-editor-table">
      <thead><tr><th></th><th>Word</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><i class="fa-solid fa-chess-pawn"></i></td>  <td><input id="mnemPawnInput" maxlength="40"></td>  <td><input id="mnemPawnDescInput" maxlength="70"></td></tr>
        <tr><td><i class="fa-solid fa-chess-knight"></i></td><td><input id="mnemKnightInput" maxlength="40"></td><td><input id="mnemKnightDescInput" maxlength="70"></td></tr>
        <tr><td><i class="fa-solid fa-chess-bishop"></i></td><td><input id="mnemBishopInput" maxlength="40"></td><td><input id="mnemBishopDescInput" maxlength="70"></td></tr>
        <tr><td><i class="fa-solid fa-chess-rook"></i></td>  <td><input id="mnemRookInput" maxlength="40"></td>  <td><input id="mnemRookDescInput" maxlength="70"></td></tr>
        <tr><td><i class="fa-solid fa-chess-queen"></i></td> <td><input id="mnemQueenInput" maxlength="40"></td> <td><input id="mnemQueenDescInput" maxlength="70"></td></tr>
        <tr><td><i class="fa-solid fa-chess-king"></i></td>  <td><input id="mnemKingInput" maxlength="40"></td>  <td><input id="mnemKingDescInput" maxlength="70"></td></tr>
      </tbody>
    </table>
    <div class="modal-actions">
      <button id="mnemonicsEditorCancelBtn">Cancel</button>
      <button id="mnemonicsEditorSaveBtn">SAVE</button>
    </div>
  </div>
</div>

<!-- hover preview mini-board (shown on dwell over an analyse icon) -->
<div id="hoverPreview"><div id="hoverPreviewBoard"></div></div>

<!-- hidden file chooser for manual NDJSON uploads -->
<input id="fileImport" type="file" accept=".ndjson,.jsonl,.txt" style="display:none">

<!-- hidden file chooser for backup restore -->
<input id="backupImport" type="file" accept=".json" style="display:none">

<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
<script src="js/version.js"></script>
<script src="js/db.js"></script>
<script type="module" src="js/app.js"></script>
</body>
</html>
